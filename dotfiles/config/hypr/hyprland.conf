# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring
# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

$mainMod = SUPER
$term = alacritty

# Monitors
monitor=,preferred,auto,1.6
# Zvonimirova stol
#monitor=desc:LG Electronics LG HDR 4K 107NTPCAD984,3840x2160,0x0,1,icc:~/.config/hypr/icc/LG_HDR_4K.icc
monitor=desc:LG Electronics LG HDR 4K 107NTPCAD984,3840x2160,0x0,1
#monitor=desc:Dell Inc. DELL P2418D MY3ND81E0TNT,2556x1440,3840x0,1,transform,1,icc:~/.config/hypr/icc/Dell_P2418D.icc
monitor=desc:Dell Inc. DELL P2418D MY3ND81E0TNT,2556x1440,3840x0,1,transform,1
#thinkpad p14s gen1 does not support the full resolution of P2418D 
#monitor=desc:Dell Inc. DELL P2418D MY3ND81E0TNT,1920x1080,3840x0,1,transform,1

# Execute apps at launch
exec-once = waybar
exec-once = wlsunset -l 45.81444 -L 15.97798  #Zagreb
exec-once = hypridle
exec-once = awww-daemon &
exec-once = python3 ~/.config/scripts/awww_randomize.py --dir ~/.config/wallpapers/small/ --interval 360 &
exec-once = env QT_QUICK_CONTROLS_STYLE=Material /usr/libexec/hyprpolkitagent &
exec-once = ~/.config/scripts/auto-monitor.sh
exec-once = mako
exec-once = blueman-tray
exec-once = dropbox start
exec-once = nm-applet --indicator
exec-once = sleep 5 && syncthing-gtk --minimized
#exec-once = ~/.go/bin/tailscale-systray  # machine-specific
exec-once = keepassxc
#exec-once = ~/code/klaudije/synthia-macropd/host/synthia_macropad.py  # machine-specific
#exec-once = ydotoold --socket-path=$XDG_RUNTIME_DIR/.ydotool_socket --socket-perm=0666
#exec-once = python3 ~/code/dictation/dictate.py

# Environment variables
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/openssh_agent
env = XCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND,1
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

input {
    kb_layout = hr(us)
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps, compose:ralt
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

device {
    name = synps/2-synaptics-touchpad
    enabled = true
    natural_scroll = true
    tap-to-click = true
    tap_button_map = lmr  # This sets the mapping for taps: l = left, m = middle, r = right
    clickfinger_behavior = true  # Enables behavior where 1, 2, or 3 fingers correspond to LMB, RMB, MMB respectively
}

device {
    name = tpps/2-elan-trackpoint
    enabled = true
}

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    resize_on_border = true
    col.active_border = rgba(0066ffaa) rgba(0000ffaa) 90deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    rounding = 3

    blur {
        enabled = false
        size = 3
        passes = 1
    }

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = specialWorkspace, 1, 3, myBezier, fade
}

dwindle {
    preserve_split = true # you probably want this
}

misc {
    disable_hyprland_logo = true
}

debug {
    vfr = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# pin workspace 1 to the LG monitor when it is connected
workspace = 1, monitor:desc:LG Electronics LG HDR 4K 107NTPCAD984, default:true
# pin workspace 10 to the Dell monitor when it is connected
workspace = 10, monitor:desc:Dell Inc. DELL P2418D MY3ND81E0TNT, default:true

# smart gaps - only active if more than one window active
# ignores special workspaces 
workspace = w[tv1]s[false], gapsout:0, gapsin:0
workspace = f[1]s[false], gapsout:0, gapsin:0
windowrule = border_size 0, match:float false, match:workspace w[tv1]s[false]
windowrule = rounding 0, match:float false, match:workspace w[tv1]s[false]
windowrule = border_size 0, match:float false, match:workspace f[1]s[false]
windowrule = rounding 0, match:float false, match:workspace f[1]s[false]

# quaketerm
bind = $mainMod, K,  togglespecialworkspace, quake
workspace = special:quake, gapsout:150, on-created-empty:$term --option window.opacity=0.75
workspace = special:quake, decoration:dim_special:0.1

#nerd dictation
# toggle start/stop dictation
bind = $mainMod, T, exec, pkill -USR1 -f dictate.py
# stop dictation
#bind = , Escape, exec, pkill -USR2 -f dictate.py
#bind = $mainMod, M, exec, pkill -WINCH -f dictate.py
#bindr = $mainMod, M, exec, pkill -USR2 -f dictate.py

# display binds
bind = $mainMod, G,  togglespecialworkspace, binds
workspace = special:binds, gapsout:150, on-created-empty:alacritty --option font.size=10 --option window.opacity=0.75 --command  ~/.config/scripts/hypr-binds/hypr-binds.py -w
workspace = special:binds, decoration:dim_special:0.1

# Multimedia buttons
bind =, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind =, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind =, XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind =, XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind =, XF86MonBrightnessDown, exec, brightnessctl set 3%-
bind =, XF86MonBrightnessUP, exec, brightnessctl set +3%

# MACROPAD
# | ALT O | ALT Q | ALT W |
# | ALT T | ALT P | ALT E |
# | ALT U | ALT I | ALT Y |
bind = $mainMod ALT, U, exec, ~/.config/scripts/toggle-gnome-theme.sh
bind = $mainMod ALT, I, exec, ~/.config/scripts/toggle-audio.sh
#bind = $mainMod ALT, O, exec, ~/firefox/firefox-bin-wayland -p oresk
bind = $mainMod ALT, O, exec, firefox -p oresk_enw
bind = $mainMod ALT, Q, exec, firefox -p king
bind = $mainMod ALT, T, exec, ~/code/ha-execute-scenes/script.py --light-id light.lovro_table
bind = $mainMod ALT, P, exec, ~/code/ha-execute-scenes/script.py --scene-id scene.ele_desk
bind = $mainMod ALT, W, exec, ~/code/ha-execute-scenes/script.py --scene-id scene.spavaca_otvoreno
bind = $mainMod ALT, E, exec, ~/code/ha-execute-scenes/script.py --scene-id scene.spavaca_manje_svjetla
#bind = $mainMod ALT, R, exec, ~/code/ha-execute-scenes/script.py --scene-id scene.desk_sit
#bind = $mainMod ALT, T, exec, ~/code/ha-execute-scenes/script.py --scene-id scene.desk_stand
bind = $mainMod ALT, Y, exec, ~/code/ha-execute-scenes/script.py --switch-id switch.bedroom_desk_tizio_switch

bind = $mainMod CTRL, G, exec, ~/.config/scripts/toggle-gnome-theme.sh

# Screenshots
bind = , PRINT, exec, grimblast copysave area
bind = $mainMod SHIFT, PRINT, exec, grimblast copysave output
bind = $mainMod CTRL, PRINT, exec, grimblast copysave active

# Basic binds
bind = $mainMod, L, exec, ~/.config/scripts/swaylock-blur.sh
bind = $mainMod, RETURN, exec, $term
bind = $mainMod, C, exec, alacritty --config-file ~/.config/alacritty/claude-code.toml -e claude
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, pcmanfm
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, O, pin,
bind = $mainMod, R, exec, tofi-run | xargs hyprctl dispatch exec --
bind = $mainMod CTRL, R, exec, tofi-drun | xargs hyprctl dispatch exec --
bind = $mainMod, P, layoutmsg, pseudo # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, H, layoutmsg, focusmaster # dwindle

# Move focus with mainMod + arrow keys / hjkl
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod CTRL, h, movefocus, l
bind = $mainMod CTRL, l, movefocus, r
bind = $mainMod CTRL, k, movefocus, u
bind = $mainMod CTRL, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active windows to other workspaces
# move without switching workspace
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10

# move with switching workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move workspace to other monitors
bind = $mainMod CTRL, left, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL, right, movecurrentworkspacetomonitor, r
bind = $mainMod CTRL, up, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL, down, movecurrentworkspacetomonitor, d

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window rules 
# KeepassXC
windowrule = border_color rgb(FF00FF) rgb(880808), match:class ^(org.keepassxc.KeePassXC)$
windowrule = float on, match:class ^(org.keepassxc.KeePassXC)$
# Firefox
windowrule = border_color rgb(FF00FF) rgb(880808), match:class ^(firefox)$, match:title (Firefox — Sharing Indicator)
# Firefox - pop up video window
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
