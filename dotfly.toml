# dotfly configuration
#
# Profiles define which tools to install and which dotfiles to process.
# Profiles can inherit from each other.
#
# File modes:
#   link    — symlink to repo file (default)
#   copy    — copy file from repo
#   append  — append source content to destination
#   prepend — prepend source content to destination

[profile.base]
description = "Essential tools and dotfiles for any machine"

[profile.desktop]
description = "Extends base with desktop/dev tools"
inherit = "base"

[profile.server]
description = "Minimal server profile"
inherit = "base"

[[profile.base.tools]]
name = "bat"
package = "bat"
method = "apt"

[[profile.base.tools]]
name = "eza"
package = "eza"
method = "apt"

[[profile.desktop.tools]]
name = "tmux"
package = "tmux"
method = "apt"

[[profile.desktop.tools]]
name = "fzf"
package = "fzf"
method = "apt"

[[profile.desktop.tools]]
name = "zoxide"
package = "zoxide"
method = "apt"

[[profile.desktop.tools]]
name = "fd-find"
package = "fd-find"
method = "apt"

[[profile.base.tools]]
name = "ripgrep"
package = "ripgrep"
method = "apt"

# .bashrc: append our additions to whatever already exists on the machine.
# The source file contains only the extra bits (aliases, PATH, etc.)
[[profile.base.files]]
source = "dotfiles/bashrc-additions.sh"
dest = "{{ home }}/.bashrc"
mode = "append"

[[profile.base.files]]
source = "dotfiles/.gitconfig"
dest = "{{ home }}/.gitconfig"
mode = "link"



# Append bash_aliases content rather than overwriting
[[profile.desktop.files]]
source = "dotfiles/aliases.sh"
dest = "{{ home }}/.bash_aliases"
mode = "append"


[[profile.server.tools]]
name = "tmux"
package = "tmux"
method = "apt"
