# dotfly configuration
#
# Profiles define which tools to install and which dotfiles to process.
# Profiles can inherit from each other.
#
# File modes:
#   link    — symlink to repo file or directory (default)
#   copy    — copy file from repo
#   append  — append source content to destination (idempotent)
#   prepend — prepend source content to destination (idempotent)
#
# Tools can carry their config alongside them using config_source
# and config_dest fields — no need for a separate [[files]] entry.

# ──────────────────────────────────────────────
# base — essentials for any Debian machine
# ──────────────────────────────────────────────
[profile.base]
description = "Essential tools and dotfiles for any machine"

[[profile.base.tools]]
name = "neovim"
package = "neovim"
method = "apt"

[[profile.base.tools]]
name = "bat"
package = "bat"
method = "apt"

[[profile.base.tools]]
name = "eza"
package = "eza"
method = "apt"

[[profile.base.tools]]
name = "tmux"
package = "tmux"
method = "apt"
config_source = "dotfiles/config/tmux/tmux.conf"
config_dest = "{{ home }}/.config/tmux/tmux.conf"
config_mode = "link"

[[profile.base.tools]]
name = "fzf"
package = "fzf"
method = "apt"

[[profile.base.tools]]
name = "zoxide"
package = "zoxide"
method = "apt"

[[profile.base.tools]]
name = "fd-find"
package = "fd-find"
method = "apt"

[[profile.base.tools]]
name = "ripgrep"
package = "ripgrep"
method = "apt"

# Files without a specific tool
[[profile.base.files]]
source = "dotfiles/bashrc-additions.sh"
dest = "{{ home }}/.bashrc"
mode = "append"

[[profile.base.files]]
source = "dotfiles/aliases.sh"
dest = "{{ home }}/.bash_aliases"
mode = "append"

[[profile.base.files]]
source = "dotfiles/.gitconfig"
dest = "{{ home }}/.gitconfig"
mode = "link"

[[profile.base.files]]
source = "dotfiles/git/ignore"
dest = "{{ home }}/.config/git/ignore"
mode = "link"

# ──────────────────────────────────────────────
# desktop — extends base with GUI/WM configs
# ──────────────────────────────────────────────
[profile.desktop]
description = "Desktop environment (Hyprland, Waybar, Alacritty, etc.)"
inherit = "base"

# Tool + config grouped together
[[profile.desktop.tools]]
name = "alacritty"
package = "alacritty"
method = "apt"
config_source = "dotfiles/config/alacritty/alacritty.toml"
config_dest = "{{ home }}/.config/alacritty/alacritty.toml"
config_mode = "link"

[[profile.desktop.tools]]
name = "waybar"
package = "waybar"
method = "apt"
config_source = "dotfiles/config/waybar"
config_dest = "{{ home }}/.config/waybar"
config_mode = "link"

[[profile.desktop.tools]]
name = "mako"
package = "mako-notifier"
method = "apt"
config_source = "dotfiles/config/mako/config"
config_dest = "{{ home }}/.config/mako/config"
config_mode = "link"

[[profile.desktop.tools]]
name = "hyprland"
package = "hyprland"
method = "apt"
optional = true
config_source = "dotfiles/config/hypr"
config_dest = "{{ home }}/.config/hypr"
config_mode = "link"

# Desktop-specific configs (directories or multi-file)
[[profile.desktop.files]]
source = "dotfiles/config/scripts"
dest = "{{ home }}/.config/scripts"
mode = "link"

[[profile.desktop.files]]
source = "dotfiles/config/starship.toml"
dest = "{{ home }}/.config/starship.toml"
mode = "link"

# ──────────────────────────────────────────────
# server — empty, for manual setup
# ──────────────────────────────────────────────
[profile.server]
description = "Minimal server (no extra tools or files)"
